<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PickSharp Pro V30.4</title>
<style>
:root{color-scheme: dark; --bg:#070A12; --txt:#F8FAFC; --line:rgba(148,163,184,.18); --yellowSoft:rgba(245,158,11,.14); --greenSoft:rgba(34,197,94,.14); --redSoft:rgba(239,68,68,.14);}
body{background:var(--bg); color:var(--txt); font-family:system-ui;}
.app{width:min(1180px,100%); margin:0 auto; padding:20px;}
.card{border:1px solid var(--line); border-radius:24px; padding:20px; margin-bottom:16px;}
.loading:after{content:"...";}
.error{color:#FECACA; background:var(--redSoft); padding:10px;}
</style>
</head>
<body>
<div class="app">
    <h1>PickSharp Pro V30.4</h1>
    <div id="status"></div>
    <div id="calendarBox" class="card"></div>
    <div id="scanBox"></div>
</div>
<script>
const $=id=>document.getElementById(id);
let MODE="mlb", EVENTS=[], SELECTED=null;

// FUNCIONES CORE
async function mlbContext(ev){
  let ctx={title:"MLB Context",items:[],raw:[],pitchersConfirmed:false,awayPitcherName:null,homePitcherName:null,pitcherStats:[]};
  try{
    let stats=await trySdio([`/v3/mlb/stats/json/PlayerSeasonStats/${new Date().getFullYear()}`]);
    ctx.pitcherStats = Array.isArray(stats) ? stats : [];
  }catch(e){}
  return ctx;
}

async function loadCalendar(){
  setBox("calendarBox", "Cargando...");
  try{
    let all=await oddsAPI(`/v4/sports/baseball_mlb/events`,{});
    EVENTS=all||[];
    setBox("calendarBox", "Eventos cargados: " + EVENTS.length);
  }catch(e){
    setBox("calendarBox", "Error: "+e.message);
  }
}

function weatherText(g){return "clima pendiente"}
async function trySdio(paths){let last; for(const p of paths){try{return await sdioAPI(p)}catch(e){last=e}} throw last}
function toSdioDate(iso){let d=new Date(iso+"T12:00:00");let months=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];return `${d.getFullYear()}-${months[d.getMonth()]}-${String(d.getDate()).padStart(2,"0")}`}
function oddsAPI(path,params={}){ return fetch("/api/odds?path="+encodeURIComponent(path)).then(r=>r.json()); }
function sdioAPI(path,params={}){ return fetch("/api/sdio?path="+encodeURIComponent(path)).then(r=>r.json()); }
function sportKey(){ return "baseball_mlb"; }
function setBox(id, html){ $(id).innerHTML = html; }
function showTab(id){}
function status(msg){ $("status").textContent = msg; }
function esc(s){ return s; }
function init(){ loadCalendar(); }

init();
</script>
</body>
</html>
